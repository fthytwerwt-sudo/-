[provider]
# 当前正式链路默认继续沿用阿里 TTS 基线。
# 实际 TTS provider 由 tts.api_route_family 决定：
# - ark_openai_compatible / edge_gateway_openai_compatible / doubao_openspeech_v3 => volcengine
# - aliyun_bailian_cosyvoice => aliyun_bailian
name = "aliyun_bailian"
region = "cn-beijing"

[auth]
# Ark / Edge Gateway / 阿里百炼 CosyVoice 使用 api_key。
# Doubao OpenSpeech v3 使用 app_id + api_key(access key)。
api_key = "SET_IN_LOCAL_FILE"
access_key_id = "SET_IN_LOCAL_FILE"
secret_access_key = "SET_IN_LOCAL_FILE"
session_token = ""
app_id = "SET_IF_REQUIRED"

[tts]
# route family:
# - ark_openai_compatible: 走 ark.<region>.volces.com/api/v3 + endpoint_id/model + voice
# - edge_gateway_openai_compatible: 走 ai-gateway.vei.volces.com/v1 + model + voice
# - aliyun_bailian_cosyvoice: 走 dashscope.aliyuncs.com/api/v1/services/audio/tts/SpeechSynthesizer + model + voice
# - doubao_openspeech_v3: 走 openspeech.bytedance.com/api/v3/tts/... + app_id/api_key/resource_id/voice
api_route_family = "aliyun_bailian_cosyvoice"
model = "cosyvoice-v3-flash"
endpoint_id = "SET_IF_ENDPOINT_REQUIRED"
resource_id = "SET_IF_OPENSPEECH_REQUIRED"
voice = "SET_IN_LOCAL_FILE"
baseline_profile = "aliyun_old_A"
style = "knowledge"
# 当前正式链路冻结旧 A 为默认可用基线，不再继续扩声音实验分支。
instruction = "你说话的情感是neutral。"
speech_rate = 1.18
pitch_rate = 0.92
volume = 46
response_format = "mp3"

[tts_style_probe]
# 固定测试文案：当前声音目标稿 v1 的所有 probe 轮次共用同一段文案，不推进 assembly。
text = "这套方案表面上堆满了参数，真正决定上限的其实只有供电、火控和协同链路。前两项还能补，第三项一旦掉队，再新的壳子也只是好看。说得更直白一点，它不是没亮点，是关键战力根本没站住。"

[tts_style_probe_variant_A]
label = "稳定版"
intent = "冷静利落，优先保住稳定判断感。"
instruction = "你说话的情感是neutral。"
speech_rate = 1.18
pitch_rate = 0.92
volume = 46
recommended = true

[tts_style_probe_variant_B]
label = "判断感更强版"
intent = "保留克制底色，同时把锋利感再往前推一点。"
instruction = "你说话的情感是disgusted。"
speech_rate = 1.24
pitch_rate = 0.9
volume = 48
recommended = false

[tts_style_probe_variant_C]
label = "更克制版"
intent = "进一步压低情绪起伏，保住冷静和收束。"
instruction = "你说话的情感是neutral。"
speech_rate = 1.08
pitch_rate = 0.9
volume = 44
recommended = false

[tts_style_probe_round2]
goal = "围绕旧 A 做第二轮更窄的微调，不重新切模型族，也不推进 assembly。"
recommended_variant_id = "A2"
recommendation_reason = "基于用户反馈“旧 A 更对，但还不完全对”，A2 保留旧 A 的冷静底座，同时把句尾压得更短、更干、更利落，偏移最小，最适合作为 round2 首推候选。"

[tts_style_probe_round2_variant_A1]
label = "更稳、更冷静"
intent = "在旧 A 的方向上进一步压住情绪起伏，让句尾更稳、更冷。"
instruction = "你说话的角色是军事装备分析员，你说话的情感是neutral。"
speech_rate = 1.14
pitch_rate = 0.9
volume = 45
recommended = false

[tts_style_probe_round2_variant_A2]
label = "更干、更利落"
intent = "保住旧 A 的冷静基础，把声线再压干一点，句尾更短更利落。"
instruction = "你说话的角色是军事装备拆解解说员，你说话的情感是neutral。"
speech_rate = 1.22
pitch_rate = 0.9
volume = 45
recommended = true
why_recommended = "基于用户反馈“旧 A 更对，但还不完全对”，A2 保留旧 A 的冷静底座，同时把句尾压得更短、更干、更利落，偏移最小，最适合作为 round2 首推候选。"

[tts_style_probe_round2_variant_A3]
label = "判断感更强一点"
intent = "在克制前提下把判断感略往前推一点，但不演讲、不煽动。"
instruction = "你说话的角色是军事鉴定解说员，你说话的情感是disgusted。"
speech_rate = 1.19
pitch_rate = 0.91
volume = 46
recommended = false

[tts_style_probe_round2_variant_A4]
label = "进一步去掉客服感/播音感"
intent = "进一步清掉客服播报感和新闻播音感，保持专业判断型口气。"
instruction = "你说话的场景是内部评估解说，你说话的情感是neutral。"
speech_rate = 1.16
pitch_rate = 0.89
volume = 44
recommended = false

[image_generation]
enabled = true
# 当前正式 generation 主链仍包含图片生成 API：
# - 建议继续接入，不要把 image_generation.model 当成可删除摆设
# - 缺失该字段时，generation 不应写成 success
# - 当前仓库默认先落视觉计划，再进入本地 assembly；这不等于图片 API 已被取消
# 免费优先主线默认模型：
# - wan2.6-image 用于首帧 / 背景 / 人像底图生成
# - 若只是修图 / 改图，不要回到 facechain-generation，改走 qwen-image-edit-plus
model = "wan2.6-image"

[video_generation]
enabled = true
# 当前正式 generation 主链仍包含视频生成 API：
# - 建议继续接入，不要把 video_generation.model 当成可删除摆设
# - 缺失该字段时，generation 不应写成 success
# - 当前默认交付改为本地 assembly，不代表视频 API 暂时不接
# 免费优先主线默认模型：
# - 普通视频主线改为 wan2.6-image -> wan2.7-i2v
# - wan2.7-videoedit 只用于后期修补 / 编辑增强，不是主生成模型
model = "wan2.7-i2v"

[portrait_detect]
enabled = false
# 真人开口分支前置检测：
# - liveportrait-detect 先做人像 / 面部检测
# - 当前在 provider=aliyun_bailian 且 enabled=true 时，已支持真实 detect 请求
model = "liveportrait-detect"

[portrait_video_generation]
enabled = false
# 真人开口分支生成模型：
# - liveportrait 用于固定背景 / 人物开口视频
# - 必须先过 liveportrait-detect
# - 当前在 provider=aliyun_bailian 且 enabled=true 时，已支持真实 create / poll / download
model = "liveportrait"

[assembly]
mode = "cloud"
# 当前阶段默认交付件是本地 mp4：
# - local assembly / 本地 mp4 / 人工上传 是当前默认交付路径
# - template_id 属于后续 cloud assembly 增强项
# - 未配置 template_id 不阻断当前阶段本地出片
template_id = "SET_IN_LOCAL_FILE"
subtitle_mode = "burn_in"
resolution = "1080x1920"
fps = 25

[storage]
# 当前阶段默认走本地 assembly：
# - space_name 属于后续 cloud assembly / 存储增强项
# - 未配置 space_name 不阻断当前阶段本地出片
space_name = "SET_IN_LOCAL_FILE"
upload_prefix = "formal_api_demo/"

[output]
dist_dir = "dist/formal_api_demo"

[polling]
interval_seconds = 5
timeout_seconds = 600

[quality_gate]
allow_local_fallback = false
require_hook = true
min_segments = 3
require_manifest_schema = true
