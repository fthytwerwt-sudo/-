[provider]
name = "volcengine"
region = "cn-beijing"

[auth]
# Ark / Edge Gateway 使用 api_key。
# Doubao OpenSpeech v3 使用 app_id + api_key(access key)。
api_key = "SET_IN_LOCAL_FILE"
access_key_id = "SET_IN_LOCAL_FILE"
secret_access_key = "SET_IN_LOCAL_FILE"
session_token = ""
app_id = "SET_IF_REQUIRED"

[tts]
# route family:
# - ark_openai_compatible: 走 ark.<region>.volces.com/api/v3 + endpoint_id/model + voice
# - edge_gateway_openai_compatible: 走 ai-gateway.vei.volces.com/v1 + model + voice
# - doubao_openspeech_v3: 走 openspeech.bytedance.com/api/v3/tts/... + app_id/api_key/resource_id/voice
api_route_family = "ark_openai_compatible"
model = "volc_tts_model_placeholder"
endpoint_id = "SET_IF_ENDPOINT_REQUIRED"
resource_id = "SET_IF_OPENSPEECH_REQUIRED"
voice = "zh_female_placeholder"
style = "knowledge"
response_format = "mp3"

[image_generation]
enabled = true
model = "volc_image_model_placeholder"

[video_generation]
enabled = true
model = "volc_video_model_placeholder"

[assembly]
mode = "cloud"
template_id = "SET_IN_LOCAL_FILE"
subtitle_mode = "burn_in"
resolution = "1080x1920"
fps = 25

[storage]
space_name = "SET_IN_LOCAL_FILE"
upload_prefix = "formal_api_demo/"

[output]
dist_dir = "dist/formal_api_demo"

[polling]
interval_seconds = 5
timeout_seconds = 600

[quality_gate]
allow_local_fallback = false
require_hook = true
min_segments = 3
require_manifest_schema = true
