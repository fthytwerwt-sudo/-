fixture_name（样例名称）: state_node_edge.blocked
case_type（样例类型）: blocked
purpose（用途）: 覆盖节点缺输入输出、失败继续推进、需要用户确认的边未进入人工介入。
expected_result（预期结果）: blocked
blocked: true
blocked_reasons:
  - node_missing_input_output_validation
  - node_failure_promoted_status
  - human_required_edge_without_interrupt
state（状态）:
  state_id（状态编号）: vf_state_no_service_blocked_001
  workflow_route_decision（工作流归位判断）: mechanism_repair_flow
  current_status（当前状态）: probe_only
nodes（节点）:
  - node_id（节点编号）: broken_node
    input（输入）: ""
    output（输出）: ""
    validation（验证）: ""
    blocked_if（阻断条件）: []
    fallback_layer（失败回退层）: ""
    trace_fields（追踪字段）: []
edges（边）:
  - edge_id（边编号）: broken_edge
    from_node（来源节点）: broken_node
    to_node（目标节点）: formal_node
    transition_condition（流转条件）: promote_to_formal
    blocked_transition_if（禁止流转条件）: []
    human_review_required_if（需要人工复审的条件）:
      - promote_probe_only_to_formal
    human_interrupt_created（是否创建人工中断）: false
status_claims（状态声明）:
  node_failure_result（节点失败结果）: promoted_status_after_failure
