contract_name: state_node_edge_contract（状态节点边契约）
version: "2026-06-18"
status: draft（草案）
project_route: video_factory（视频工厂）
purpose（用途）: 在不安装 LangGraph（图工作流库）、不启动 service（服务）的前提下，定义 State / Node / Edge（状态 / 节点 / 边）的本地可验证结构。
state_required_fields（状态必填字段）:
  - state_id（状态编号）
  - workflow_route_decision（工作流归位判断）
  - current_status（当前状态）
  - evidence_files（证据文件）
  - status_not_promoted（未推进状态）
node_required_fields（节点必填字段）:
  - node_id（节点编号）
  - input（输入）
  - output（输出）
  - validation（验证）
  - blocked_if（阻断条件）
  - fallback_layer（失败回退层）
  - trace_fields（追踪字段）
edge_required_fields（边必填字段）:
  - edge_id（边编号）
  - from_node（来源节点）
  - to_node（目标节点）
  - transition_condition（流转条件）
  - blocked_transition_if（禁止流转条件）
  - human_review_required_if（需要人工复审的条件）
hard_rules（硬规则）:
  no_langgraph_install_required（不需要安装 LangGraph）: true
  service_start_forbidden（禁止启动服务）: true
  graph_cannot_replace_project_router（图不能替代项目状态动作总控器）: true
  node_failure_cannot_promote_status（节点失败不能推进状态）: true
  human_required_edge_must_interrupt（需要用户确认的边必须中断）: true
